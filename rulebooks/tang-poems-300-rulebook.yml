---
- name: Listen for event on a webhook
  hosts: all

  ## Define our source for events

  sources:
    - ansible.eda.webhook:
        host: 0.0.0.0
        port: 5000

  rules:
    - name: tang poem research 
      condition: event.payload.keyword
      action:
        set_fact:
          fact:
            keyword: "{{ event.payload.keyword }}"
        print_event:
          pretty: true
        run_playbook:
          name: search-tang-poems-300.yml
