---
- name: Listen for event on a webhook
  hosts: all

  ## Define our source for events

  sources:
    - ansible.eda.webhook:
        host: 0.0.0.0
        port: 5000

  ## Define the conditions we are looking for

  rules:
    - name: 
      condition: 
        any:
          keyword == "" 

  ## Define the action we should take should the condition be met

      action:
        run_playbook:
          name: search-tang-poems-300.yml
